<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Boat Seafood Restaurant — Welcome</title>
<meta name="description" content="Welcome to Boat Seafood Restaurant. View our menu, leave a review, or follow us on social media.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100vh;min-height:100dvh;overflow-x:hidden}

/* ── Palette ──
   Midnight Hull:  #0A1628
   Deep Current:   #0F2137
   Weathered Teak: #8B6914
   Brass Fitting:  #C49A3C
   Sea Foam:       #A8C5B8
   Driftwood:      #D4C5A9
   Pearl Shell:    #F2EDE4
   Warm White:     #FAF7F2
*/

body{
  font-family:'Outfit',sans-serif;
  background:#0A1628;
  color:#F2EDE4;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  min-height:100dvh;
  position:relative;
}

/* ── Ambient Background ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(164,197,184,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(196,154,60,0.04) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 60%, rgba(164,197,184,0.03) 0%, transparent 50%),
    linear-gradient(180deg, #0A1628 0%, #0F2137 40%, #0A1628 100%);
  z-index:0;
  pointer-events:none;
}

/* ── Subtle animated grain texture ── */
body::after{
  content:'';
  position:fixed;
  inset:0;
  opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
  z-index:0;
  pointer-events:none;
}

/* ── Main Card ── */
.profile-card{
  position:relative;
  z-index:1;
  width:100%;
  max-width:420px;
  padding:3rem 1.75rem 2.5rem;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}

/* ── Logo ── */
.logo-wrap{
  width:220px;
  height:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:1.5rem;
  opacity:0;
  transform:scale(0.85) translateY(20px);
  animation:popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards, floatLogo 4s ease-in-out 1s infinite;
}
.logo-wrap img{
  width:100%;
  height:auto;
  object-fit:contain;
  filter: brightness(0) invert(1) drop-shadow(0px 8px 16px rgba(0,0,0,0.5));
}

/* ── Restaurant Name ── */
.rest-name{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:2rem;
  font-weight:500;
  letter-spacing:0.04em;
  color:#FAF7F2;
  text-align:center;
  line-height:1.15;
  margin-bottom:0.25rem;
  opacity:0;
  transform:translateY(15px);
  animation:slideUp 0.7s ease 0.5s forwards;
}

/* ── Tagline ── */
.tagline{
  font-family:'Outfit',sans-serif;
  font-size:0.82rem;
  font-weight:300;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:#A8C5B8;
  margin-bottom:0.4rem;
  opacity:0;
  transform:translateY(10px);
  animation:slideUp 0.6s ease 0.7s forwards;
}

/* ── Location ── */
.location{
  font-size:0.82rem;
  font-weight:300;
  color:rgba(212,197,169,0.7);
  letter-spacing:0.08em;
  margin-bottom:1.8rem;
  display:flex;
  align-items:center;
  gap:0.4rem;
  opacity:0;
  transform:translateY(10px);
  animation:slideUp 0.6s ease 0.85s forwards;
}
.location svg{
  width:13px;
  height:13px;
  fill:none;
  stroke:rgba(212,197,169,0.55);
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  flex-shrink:0;
}

/* ── Divider ── */
.divider{
  width:60px;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,154,60,0.4),transparent);
  margin-bottom:2rem;
  opacity:0;
  animation:fadeIn 0.8s ease 1s forwards;
}

/* ── Action Buttons ── */
.actions{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:0.85rem;
  margin-bottom:2.2rem;
}

.action-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.7rem;
  width:100%;
  padding:1rem 1.5rem;
  border-radius:14px;
  text-decoration:none;
  font-family:'Outfit',sans-serif;
  font-size:0.95rem;
  font-weight:500;
  letter-spacing:0.04em;
  transition:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
  cursor:pointer;
  border:none;
  position:relative;
  overflow:hidden;
  opacity:0;
  transform:translateY(18px);
}
.action-btn::before{
  content:'';
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 0.3s ease;
  border-radius:14px;
}
.action-btn:active{
  transform:scale(0.97) !important;
}
.action-btn svg{
  width:20px;
  height:20px;
  flex-shrink:0;
}

/* View Menu — Primary */
.btn-menu{
  background:linear-gradient(135deg,#C49A3C 0%,#8B6914 100%);
  color:#0A1628;
  box-shadow:0 4px 20px rgba(196,154,60,0.25), 0 1px 3px rgba(0,0,0,0.15);
  animation:slideUp 0.6s ease 1.1s forwards;
}
.btn-menu::before{
  background:linear-gradient(135deg,#D4AA4C 0%,#9B7924 100%);
}
.btn-menu:hover::before,.btn-menu:focus::before{opacity:1}
.btn-menu:hover{
  box-shadow:0 6px 28px rgba(196,154,60,0.35), 0 2px 6px rgba(0,0,0,0.2);
  transform:translateY(-2px);
}

/* Review Us — Secondary */
.btn-review{
  background:rgba(168,197,184,0.08);
  color:#A8C5B8;
  border:1px solid rgba(168,197,184,0.18);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  animation:slideUp 0.6s ease 1.25s forwards;
}
.btn-review::before{
  background:rgba(168,197,184,0.05);
}
.btn-review:hover::before,.btn-review:focus::before{opacity:1}
.btn-review:hover{
  border-color:rgba(168,197,184,0.35);
  color:#c2ddd2;
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(168,197,184,0.1);
}

/* Follow Us — Tertiary */
.btn-follow{
  background:rgba(212,197,169,0.06);
  color:#D4C5A9;
  border:1px solid rgba(212,197,169,0.14);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  animation:slideUp 0.6s ease 1.4s forwards;
}
.btn-follow::before{
  background:rgba(212,197,169,0.04);
}
.btn-follow:hover::before,.btn-follow:focus::before{opacity:1}
.btn-follow:hover{
  border-color:rgba(212,197,169,0.3);
  color:#e4d5b9;
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(212,197,169,0.08);
}

/* ── Social Icons Row ── */
.socials{
  display:flex;
  align-items:center;
  gap:1.5rem;
  margin-bottom:2rem;
  opacity:0;
  transform:translateY(12px);
  animation:slideUp 0.6s ease 2.15s forwards;
}
.social-link{
  width:48px;
  height:48px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(242,237,228,0.05);
  border:1px solid rgba(242,237,228,0.1);
  transition:all 0.3s ease;
  text-decoration:none;
}
.social-link:hover{
  background:rgba(242,237,228,0.1);
  border-color:rgba(196,154,60,0.35);
  transform:translateY(-3px);
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.social-link:active{
  transform:scale(0.92);
}
.social-link svg{
  width:20px;
  height:20px;
  fill:#D4C5A9;
  transition:fill 0.3s ease;
}
.social-link:hover svg{
  fill:#C49A3C;
}

/* ── Footer ── */
.foot{
  font-size:0.72rem;
  font-weight:300;
  color:rgba(212,197,169,0.3);
  letter-spacing:0.15em;
  text-transform:uppercase;
  opacity:0;
  animation:fadeIn 0.8s ease 2.4s forwards;
}

/* ── Floating particles ── */
.particle{
  position:fixed;
  border-radius:50%;
  background:rgba(196,154,60,0.12);
  pointer-events:none;
  z-index:0;
  animation:drift linear infinite;
}
@keyframes drift{
  0%{transform:translateY(0) translateX(0);opacity:0}
  15%{opacity:0.6}
  85%{opacity:0.2}
  100%{transform:translateY(-100vh) translateX(var(--dx));opacity:0}
}

/* ── Animations ── */
@keyframes popIn{
  to{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes slideUp{
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  to{opacity:1}
}
@keyframes floatLogo{
  0%,100%{
    transform:scale(1) translateY(0);
  }
  50%{
    transform:scale(1) translateY(-6px);
  }
}

/* ── Responsive Tweaks ── */
@media(max-width:380px){
  .profile-card{padding:2.5rem 1.25rem 2rem}
  .logo-wrap{width:180px}
  .rest-name{font-size:1.7rem}
  .action-btn{padding:0.9rem 1.2rem;font-size:0.9rem}
}
@media(min-width:500px){
  .profile-card{padding:3.5rem 2.5rem 3rem}
  .logo-wrap{width:280px}
}

/* ── Focus accessibility ── */
.action-btn:focus-visible,.social-link:focus-visible{
  outline:2px solid #C49A3C;
  outline-offset:3px;
}
@media (max-width: 768px) {
  .logo-wrap { margin-bottom: 1.1rem; }
  .rest-name { margin-bottom: 0.2rem; }
}
</style>
</head>

<script>
// ── Ambient floating particles ──
(function(){
  for(var i=0;i<18;i++){
    var p=document.createElement('div');
    p.className='particle';
    var sz=1.5+Math.random()*3;
    var x=Math.random()*100;
    var dur=14+Math.random()*20;
    var del=-(Math.random()*18);
    var dx=(Math.random()-0.5)*80;
    var colors=['rgba(196,154,60,0.1)','rgba(168,197,184,0.08)','rgba(242,237,228,0.06)'];
    p.style.cssText='left:'+x+'vw;bottom:-'+sz+'px;width:'+sz+'px;height:'+sz+'px;--dx:'+dx+'px;animation-duration:'+dur+'s;animation-delay:'+del+'s;background:'+colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(p);
  }
})();

function saveContact() {
  var vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Boat Seafood Restaurant\nORG:Boat Seafood Restaurant\nADR;TYPE=WORK:;;Waterfront Market;Dubai;;;UAE\nEND:VCARD";
  var blob = new Blob([vcard], { type: "text/vcard" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "Boat_Seafood_Restaurant.vcf";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function sharePage() {
  if (navigator.share) {
    navigator.share({
      title: 'Boat Seafood Restaurant',
      text: 'Welcome to Boat Seafood Restaurant. View our menu, leave a review, or follow us on social media.',
      url: window.location.href,
    }).catch(function(error) { console.log('Error sharing', error); });
  } else {
    navigator.clipboard.writeText(window.location.href).then(function() {
      alert("Link copied to clipboard!");
    });
  }
}
</script>

</body>
</html>
